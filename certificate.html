<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar-Plus | Bihar E-Services</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --admin: #dc3545; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #333; }
        .tab-container { display: flex; border-bottom: 3px solid var(--primary); margin-bottom: 25px; cursor: pointer; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; background: var(--light); border: 1px solid #ddd; }
        .tab.active { background: var(--primary); color: white; }
        .panel { display: none; padding: 10px; }
        .panel.active { display: block; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 250px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .captcha-wrapper { background: #eee; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 10px; }
    </style>

    <script type="text/javascript" src="https://www.google.com/jsapi"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="container">
    <h2>Sarkar-Plus | Bihar E-Services</h2>

    <div class="tab-container">
        <div class="tab active" onclick="switchTab('user-tab', this)">👤 User Portal</div>
        <div class="tab" onclick="switchTab('admin-tab', this)">⚙️ Admin Panel</div>
    </div>

    <div id="user-tab" class="panel active">
        <div id="user-app">
            <h3>Certificate Application Form</h3>
            <form onsubmit="handleApplication(event)">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Naam (English me likhein, Space dabate hi Hindi ho jayega):</label>
                        <input type="text" id="vNameHindi" placeholder="जैसे: Vivek Kumar" required>
                    </div>
                    <div class="form-group">
                        <label>Praman Patra ka Prakar:</label>
                        <select id="appType" required>
                            <option value="Aawasiya">Aawasiya (Residence)</option>
                            <option value="Jati">Jati (Caste)</option>
                            <option value="Aay">Aay (Income)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Zila (District):</label>
                        <select id="vDistrict" onchange="updateSubDivisions()" required>
                            <option value="">-- Chunein --</option>
                            <option value="Sitamarhi">Sitamarhi</option>
                            <option value="Patna">Patna</option>
                            <option value="Muzaffarpur">Muzaffarpur</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Anumandal (Sub-Division):</label>
                        <select id="vSubDiv" onchange="updateBlocks()" required>
                            <option value="">-- Pehle Zila Chunein --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Prakhand (Block):</label>
                        <select id="vBlock" required>
                            <option value="">-- Pehle Anumandal Chunein --</option>
                        </select>
                    </div>
                </div>

                <div class="captcha-wrapper"><span id="capAppText"></span></div>
                <input type="number" id="capAppInput" placeholder="Answer" required>
                
                <button type="submit" style="background:var(--success)">Submit Application</button>
            </form>
        </div>
    </div>

    <div id="admin-tab" class="panel">
        <div id="admin-dash">
            <h3 style="color:var(--admin)">Admin Console</h3>
            <div style="background:#fff1f1; padding:20px; border:1px solid #ffcccc; border-radius:10px;">
                <h4>➕ Add Officer</h4>
                <form onsubmit="addDeptUser(event)">
                    <input type="text" id="addOffName" placeholder="Officer Name" required>
                    <input type="text" id="addOffId" placeholder="User ID" required>
                    <input type="password" id="addOffPass" placeholder="Password" required>
                    <button type="submit">Create Officer ID</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // --- BIHAR ADMINISTRATIVE DATA ---
    const biharData = {
        "Sitamarhi": {
            "Sadar": ["Dumra", "Runnisaidpur", "Belsand", "Parsauni"],
            "Pupri": ["Pupri", "Nanpur", "Bajpatti", "Choraut", "Bokhara"],
            "Belsand": ["Belsand", "Parsauni"]
        },
        "Patna": {
            "Patna Sadar": ["Patna Sadar", "Phulwari Sharif", "Sampatchak"],
            "Danapur": ["Danapur", "Khagaul", "Naubatpur", "Bihta"]
        },
        "Muzaffarpur": {
            "East": ["Mushahari", "Bochahan", "Sakra", "Dholi"],
            "West": ["Kanti", "Marwan", "Paroo", "Saraiya"]
        }
    };

    // --- HINDI TRANSLITERATION SETUP ---
    google.load("elements", "1", { packages: "transliteration" });
    function onLoadHindi() {
        var options = {
            sourceLanguage: google.elements.transliteration.LanguageCode.ENGLISH,
            destinationLanguage: [google.elements.transliteration.LanguageCode.HINDI],
            shortcutKey: 'ctrl+g',
            transliterationEnabled: true
        };
        var control = new google.elements.transliteration.TransliterationControl(options);
        control.makeTransliteratable(['vNameHindi']); // Input ID yahan dein
    }
    google.setOnLoadCallback(onLoadHindi);

    // --- DYNAMIC DROPDOWN LOGIC ---
    function updateSubDivisions() {
        const dist = document.getElementById('vDistrict').value;
        const subDivDropdown = document.getElementById('vSubDiv');
        const blockDropdown = document.getElementById('vBlock');
        
        subDivDropdown.innerHTML = '<option value="">-- Chunein --</option>';
        blockDropdown.innerHTML = '<option value="">-- Pehle Anumandal Chunein --</option>';

        if(dist && biharData[dist]) {
            for(let sub in biharData[dist]) {
                let opt = document.createElement('option');
                opt.value = sub;
                opt.innerHTML = sub;
                subDivDropdown.appendChild(opt);
            }
        }
    }

    function updateBlocks() {
        const dist = document.getElementById('vDistrict').value;
        const subDiv = document.getElementById('vSubDiv').value;
        const blockDropdown = document.getElementById('vBlock');

        blockDropdown.innerHTML = '<option value="">-- Chunein --</option>';

        if(dist && subDiv && biharData[dist][subDiv]) {
            biharData[dist][subDiv].forEach(block => {
                let opt = document.createElement('option');
                opt.value = block;
                opt.innerHTML = block;
                blockDropdown.appendChild(opt);
            });
        }
    }

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyBtLL0yVgt5hQwxokdsSRkeArZab5kyr_Q",
      authDomain: "mithilahelp-4107d.firebaseapp.com",
      projectId: "mithilahelp-4107d",
      storageBucket: "mithilahelp-4107d.firebasestorage.app",
      messagingSenderId: "525345376934",
      appId: "1:525345376934:web:7083c7cecccd26a4a78267"
    };

    firebase.initializeApp(firebaseConfig);
    firebase.firestore().settings({ experimentalForceLongPolling: true, useFetchStreams: false });
    const db = firebase.firestore();

    // --- CAPTCHA ---
    let n1, n2;
    function genCaptcha() {
        n1 = Math.floor(Math.random() * 9) + 1;
        n2 = Math.floor(Math.random() * 9) + 1;
        document.getElementById('capAppText').innerText = `${n1} + ${n2} = ?`;
    }

    function switchTab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- FORM SUBMIT ---
    function handleApplication(e) {
        e.preventDefault();
        if(parseInt(document.getElementById('capAppInput').value) !== (n1+n2)) {
            alert("Wrong Captcha!"); return;
        }

        db.collection("Applications").add({
            name: document.getElementById('vNameHindi').value,
            district: document.getElementById('vDistrict').value,
            subDivision: document.getElementById('vSubDiv').value,
            block: document.getElementById('vBlock').value,
            type: document.getElementById('appType').value,
            status: "Pending",
            date: new Date()
        }).then(() => {
            alert("✅ Form Submitted! (Hindi Name & Location Saved)");
            e.target.reset(); genCaptcha();
        }).catch(() => alert("❌ Error!"));
    }

    // --- ADMIN: CREATE OFFICER ---
    function addDeptUser(e) {
        e.preventDefault();
        db.collection("DepartmentUsers").add({
            name: document.getElementById('addOffName').value,
            id: document.getElementById('addOffId').value,
            pass: document.getElementById('addOffPass').value,
            createdAt: new Date()
        }).then(() => { alert("✅ Officer Created!"); e.target.reset(); });
    }

    window.onload = genCaptcha;
</script>

</body>
</html>
